<!-- auteurs.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Auteurs</title>
</head>
<body>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>


<h2>Liste des auteurs</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="auteur : ${listAuteurs}">
        <td th:text="${auteur.id}"></td>
        <td th:text="${auteur.nom}"></td>
        <td>
            <a th:href="@{/auteurs/edit/{id}(id=${auteur.id})}">Modifier</a>
            <a th:href="@{/auteurs/delete/{id}(id=${auteur.id})}">Supprimer</a>
        </td>
    </tr>
    </tbody>
</table>
<a href="/auteurs/new">Ajouter un nouvel auteur</a>
</body>
</html>
