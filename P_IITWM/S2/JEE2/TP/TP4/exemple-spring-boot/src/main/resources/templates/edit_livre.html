<!-- edit_livre.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifier un Livre</title>
</head>
<body>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>


<h2>Modifier un Livre</h2>
<form th:action="@{/livres/save}" th:object="${livre}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <label for="titre">Titre:</label>
    <input type="text" th:field="*{titre}" id="titre"/><br/>

    <label for="isbn">ISBN:</label>
    <input type="text" th:field="*{isbn}" id="isbn"/><br/>

    <label for="nombrePages">Nombre de Pages:</label>
    <input type="number" th:field="*{nombrePages}" id="nombrePages"/><br/>

    <label for="auteur">Auteur:</label>
    <select th:field="*{auteur}" id="auteur">
        <option th:each="auteur : ${auteurs}" th:value="${auteur.id}" th:text="${auteur.nom}" th:selected="${auteur.id == livre.auteur.id}"></option>
    </select><br/>

    <label for="categorie">Catégorie:</label>
    <select th:field="*{categorie}" id="categorie">
        <option th:each="categorie : ${categories}" th:value="${categorie.id}" th:text="${categorie.nom}" th:selected="${categorie.id == livre.categorie.id}"></option>
    </select><br/>

    <input type="submit" value="Sauvegarder"/>
</form>
</body>
</html>
