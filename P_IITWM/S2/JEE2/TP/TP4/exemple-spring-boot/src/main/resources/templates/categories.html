<!-- categories.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Catégories</title>
</head>
<body>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>

<h2>Liste des catégories</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="categorie : ${listCategories}">
        <td th:text="${categorie.id}"></td>
        <td th:text="${categorie.nom}"></td>
        <td>
            <a th:href="@{/categories/edit/{id}(id=${categorie.id})}">Modifier</a>
            <a th:href="@{/categories/delete/{id}(id=${categorie.id})}">Supprimer</a>
        </td>
    </tr>
    </tbody>
</table>
<a href="/categories/new">Ajouter une nouvelle catégorie</a>
</body>
</html>
